<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Premium Portfolio | Digital Alchemist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body class="dark-mode">
  <div class="cursor-glow" id="cursor-glow"></div>
  <div class="blob-bg"></div>
  <header id="header">
    <nav class="container">
      <div class="logo"><span class="gradient-text">ALCHEMIST</span></div>
      <ul class="nav-links">
        <li><a href="#hero">Home</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section id="hero" class="hero-section">
      <div class="container hero-container">
        <div class="hero-content">
          <h2 class="sub-headline">Creative Developer & Designer</h2>
          <h1 class="main-headline">デジタル体験の<span class="gradient-text">創造</span></h1>
          <p class="hero-description">
            最新のテクノロジーと美学を融合し、感動を与える体験を創造します。
          </p>
          <div class="hero-buttons">
            <a href="#projects" class="btn btn-primary">Works</a>
          </div>
        </div>
        <div class="hero-visual">
          <img src="assets/portfolio_hero_bg.png" alt="Hero" class="hero-img">
        </div>
      </div>
    </section>
  </main>
  <script src="index.js"></script>
</body>

</html>
